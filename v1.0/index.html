<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>挂机文字 RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/combat-demo.css?v=release-20260612-2" />
  <link rel="stylesheet" href="css/home-demo.css?v=release-20260613-3" />
  <link rel="stylesheet" href="css/gm.css?v=release-20260612-4" />
</head>
<body>
  <div id="ui-root"></div>
  <div id="toast-container" class="toast-container"></div>
  <script>
    (function () {
      function showBootError(title, detail) {
        var root = document.getElementById('ui-root');
        if (!root) return;
        root.innerHTML = '<div style="margin:24px;padding:16px;border:2px solid #b34;background:#fff8f3;color:#4a1f12;font-family:monospace;white-space:pre-wrap;">'
          + '<b>' + title + '</b>\n\n' + String(detail || 'Unknown error')
          + '</div>';
      }
      window.addEventListener('error', function (event) {
        showBootError('启动错误', event.message + '\n' + (event.filename || '') + ':' + (event.lineno || 0) + ':' + (event.colno || 0));
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason || {};
        showBootError('异步启动错误', (reason.stack || reason.message || reason));
      });
    }());
  </script>
  <script type="module" src="main.js?v=release-20260613-5"></script>
  <script src="gm.js?v=release-20260612-4"></script>
</body>
</html>
